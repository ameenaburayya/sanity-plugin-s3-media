name: CI & Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build
        run: pnpm build:all
      - name: Pack Check
        run: pnpm pack:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build Workspace Packages
        run: pnpm -r --filter './packages/**' --if-present --sort run build
      - name: Lint
        run: pnpm lint:ci

  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build Workspace Packages
        run: pnpm -r --filter './packages/**' --if-present --sort run build
      - name: Test (Shard ${{ matrix.shard }}/4)
        run: vitest run --shard=${{ matrix.shard }}/4

  test-packages:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build Workspace Packages
        run: pnpm -r --filter './packages/**' --if-present --sort run build
      - name: Test Workspace Packages
        run: pnpm -r --filter './packages/**' --if-present test

  release:
    runs-on: ubuntu-latest
    needs:
      - build
      - lint
      - test
      - test-packages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Build Internal Types Package
        run: pnpm --filter sanity-plugin-s3-media-types run build
      - name: Update npm for trusted publishing (OIDC)
        run: npm install -g npm@latest
      - name: Create Release PR or Publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN || secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: ${{ github.event.repository.visibility == 'public' && 'true' || 'false' }}
