name: CI & Release

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:all
      - run: pnpm build:all
      - run: pnpm test:coverage:all
      - run: pnpm pack:check
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage
            packages/**/coverage
          if-no-files-found: error

  release:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Version Packages
        run: pnpm version-packages
        env:
          HUSKY: 0
      - name: Commit And Push Version Updates
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore(release): version packages [skip ci]"
            git push origin HEAD:main
          fi
        env:
          HUSKY: 0
      - name: Build Internal Types Package
        run: pnpm --filter sanity-plugin-s3-media-types run build
      - name: Select npm token
        run: |
          if [ -n "${PRIMARY_NPM_TOKEN}" ]; then
            echo "NPM_AUTH_TOKEN=${PRIMARY_NPM_TOKEN}" >> "$GITHUB_ENV"
            echo "Using NPM_TOKEN secret for publish auth"
          elif [ -n "${FALLBACK_NPM_PUBLISH_TOKEN}" ]; then
            echo "NPM_AUTH_TOKEN=${FALLBACK_NPM_PUBLISH_TOKEN}" >> "$GITHUB_ENV"
            echo "Using NPM_PUBLISH_TOKEN secret for publish auth"
          else
            echo "No npm auth secret configured. Set NPM_TOKEN or NPM_PUBLISH_TOKEN."
            exit 1
          fi
        env:
          PRIMARY_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          FALLBACK_NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_AUTH_TOKEN}" > ~/.npmrc
      - name: Publish Packages
        run: NPM_TOKEN="${NPM_AUTH_TOKEN}" NODE_AUTH_TOKEN="${NPM_AUTH_TOKEN}" pnpm release
