name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build
        run: pnpm build:all
      - name: Pack Check
        run: pnpm pack:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build Workspace Packages
        run: pnpm -r --filter './packages/**' --if-present --sort run build
      - name: Lint
        run: pnpm lint:ci

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Build Workspace Packages
        run: pnpm -r --filter './packages/**' --if-present --sort run build
      - name: Test
        run: pnpm test:ci
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage
            packages/**/coverage
          if-no-files-found: error
